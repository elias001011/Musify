version: 10.0.8.{build}-{branch}

branches:
  only:
    - master
    - desktop-port
    - /desktop-v.*/

skip_non_tags: true

skip_commits:
  files:
    - "**/*.md"
    - "fastlane/**"

image: Visual Studio 2022

environment:
  FLUTTER_HOME: C:\flutter

install:
  - ps: |
      $ErrorActionPreference = "Stop"
      $flutterVersionMatch = Select-String -Path pubspec.yaml -Pattern '^\s+flutter:\s+\^?(.+)$'
      $flutterVersion = $flutterVersionMatch.Matches[0].Groups[1].Value.Trim()
      if (Test-Path $env:FLUTTER_HOME) {
        Remove-Item -Recurse -Force $env:FLUTTER_HOME
      }
      git clone --depth 1 --branch $flutterVersion https://github.com/flutter/flutter.git $env:FLUTTER_HOME
      $env:Path = "$env:FLUTTER_HOME\bin;$env:Path"
      flutter --version
      flutter config --enable-windows-desktop
      flutter doctor -v

before_build:
  - ps: |
      $env:Path = "$env:FLUTTER_HOME\bin;$env:Path"
      flutter pub get

build_script:
  - ps: |
      $ErrorActionPreference = "Stop"
      $env:Path = "$env:FLUTTER_HOME\bin;$env:Path"
      flutter build windows --release

after_build:
  - ps: |
      $ErrorActionPreference = "Stop"
      $appVersionMatch = Select-String -Path pubspec.yaml -Pattern '^version:\s+([^+\s]+)'
      $env:MUSIFY_VERSION = $appVersionMatch.Matches[0].Groups[1].Value.Trim()

      New-Item -ItemType Directory -Force -Path build\desktop-artifacts | Out-Null
      7z a build\desktop-artifacts\Musify-windows-x64-portable.zip .\build\windows\x64\runner\Release\*

      choco install innosetup -y --no-progress
      & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" .github\installer\windows\musify.iss

artifacts:
  - path: build\desktop-artifacts\Musify-windows-x64-portable.zip
    name: Musify-windows-x64-portable
  - path: build\desktop-artifacts\Musify-windows-x64-setup.exe
    name: Musify-windows-x64-setup

deploy:
  - provider: GitHub
    repository: elias001011/Musify
    auth_token: $(GITHUB_TOKEN)
    artifact: /Musify-windows-x64-.*/
    tag: $(APPVEYOR_REPO_TAG_NAME)
    release: Musify Desktop $(APPVEYOR_REPO_TAG_NAME)
    description: Windows desktop build generated by AppVeyor.
    prerelease: true
    force_update: true
    on:
      APPVEYOR_REPO_TAG: true
